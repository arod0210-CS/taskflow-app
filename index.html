<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="container">
      
      <div class="top-bar">
        <div>
          <p class="eyebrow">Stay organized</p>
          <h1 class="logo-text">TaskFlow</h1>
        </div>

        <div class="top-bar-right" style="position: relative;">
          <div class="date-box" id="todayDate"></div>
          
          <button id="settingsBtn" class="hamburger-btn" type="button" aria-label="Menu">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>

          <div id="settingsPanel" class="hamburger-menu hidden">
            <div class="menu-section">
              <h3>Settings</h3>
              <div class="setting-item">
                <span>Dark mode</span>
                <label class="theme-switch">
                  <input type="checkbox" id="darkModeToggle" />
                  <span class="slider"><span class="slider-icon">🌙</span></span>
                </label>
              </div>
            </div>

            <div class="menu-section">
              <h3>Themes</h3>
              <label class="setting-item">
                <span>Theme color</span>
                <select id="themeSelect">
                  <option value="default">Default</option>
                  <option value="blue">Blue</option>
                  <option value="green">Green</option>
                  <option value="purple">Purple</option>
                  <option value="fritolay">Frito-Lay Corporate</option>
                </select>
              </label>
            </div>

            <div class="menu-section">
              <h3>Data Management</h3>
              <button id="exportBtn" class="setting-action-btn" type="button" style="margin-bottom: 8px;">Export Data (.json)</button>
              <label class="setting-action-btn" style="display: block; text-align: center; background: var(--btn-neutral-bg); color: var(--btn-neutral-fg); cursor: pointer;">
                Import Data
                <input type="file" id="importFile" accept=".json" style="display: none;" />
              </label>
            </div>

            <div class="menu-section">
              <button id="editModeToggle" class="setting-action-btn" type="button">Edit Mode: OFF</button>
            </div>
          </div>
        </div>
      </div>

      <div class="stats-card">
        <div class="stats-row">
          <div class="stat">
            <span class="stat-label">Tasks Left</span>
            <span class="stat-number" id="tasksLeft">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Completed</span>
            <span class="stat-number" id="tasksCompleted">0</span>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-text">
            <span>Progress</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>

      <div class="task-input">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <input type="date" id="dueDateInput" />
        <select id="priorityInput">
          <option value="high">High Priority</option>
          <option value="medium" selected>Medium Priority</option>
          <option value="low">Low Priority</option>
        </select>
        <button id="addTaskBtn" type="button">Add Task</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <div class="view-bar" style="justify-content: space-between;">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="view-btn active" type="button" data-view="all">All</button>
          <button class="view-btn" type="button" data-view="today">Today</button>
          <button class="view-btn" type="button" data-view="week">Week</button>
          <button class="view-btn" type="button" data-view="month">Month</button>
        </div>
        <input type="text" id="searchInput" placeholder="Search tasks..." style="padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-family: inherit;" />
      </div>

      <div class="section">
        <div class="section-header">
          <h2 id="todoHeading">To Do</h2>
        </div>
        <ul id="todoList" class="task-list"></ul>
      </div>

      <div class="section">
        <div class="section-header">
          <h2 id="completedHeading">Completed</h2>
        </div>
        <ul id="completedList" class="task-list"></ul>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
