<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="tasks.css" />
</head>
<body>
  <div class="app-shell">
    <div class="container">
      <div class="top-bar">
        <div>
          <p class="eyebrow">Stay organized</p>
          <h1>TaskFlow</h1>
        </div>
        <div class="date-box" id="todayDate"></div>
      </div>

      <div class="stats-card">
        <div class="stats-row">
          <div class="stat">
            <span class="stat-label">Tasks Left</span>
            <span class="stat-number" id="tasksLeft">0</span>
          </div>

          <div class="stat">
            <span class="stat-label">Completed</span>
            <span class="stat-number" id="tasksCompleted">0</span>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-text">
            <span>Progress</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>

      <div class="task-input">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <button id="addTaskBtn" type="button">Add Task</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <div class="section">
        <div class="section-header">
          <h2>To Do</h2>
        </div>
        <ul id="todoList" class="task-list"></ul>
      </div>

      <div class="section">
        <div class="section-header">
          <h2>Completed</h2>
        </div>
        <ul id="completedList" class="task-list"></ul>
      </div>
    </div>
  </div>

  <script src="tasks.js"></script>
  <script src="script.js"></script>
</body>
</html>
